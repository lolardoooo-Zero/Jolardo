<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Jolardo</title>
<link rel="icon" href="assets/logo/jolardo-mark.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/auth.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo"><img src="assets/logo/jolardo-wordmark.svg" alt="Jolardo" /></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="index.html#services">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="nav-actions">
      <a href="register.html" class="btn btn-gold btn-sm">Create Account</a>
    </div>
    <button class="nav-toggle" aria-label="Toggle menu"><span></span></button>
  </div>
</header>

<main class="auth-shell">
  <div class="auth-card reveal is-visible">
    <div class="auth-logo"><img src="assets/logo/jolardo-wordmark.svg" alt="Jolardo" /></div>
    <h1>Welcome Back</h1>
    <p class="auth-sub">Sign in to manage your Jolardo account.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="lEmail">Email</label>
        <input type="email" id="lEmail" name="email" placeholder="you@company.com" required />
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="lPassword">Password</label>
        <input type="password" id="lPassword" name="password" placeholder="••••••••" required />
        <button type="button" class="pw-toggle" data-target="lPassword">Show</button>
        <div class="form-error"></div>
      </div>
      <div class="form-row-inline">
        <label class="remember-check"><input type="checkbox" id="lRemember" /> Remember me</label>
        <a href="#" id="forgotLink" class="link-gold">Forgot password?</a>
      </div>
      <button type="submit" id="lSubmit" class="btn btn-gold auth-submit">Sign In</button>
    </form>

    <div class="auth-switch">Don't have an account? <a href="register.html" class="link-gold">Create one</a></div>
  </div>
</main>

<!-- Forgot Password Modal -->
<div class="jl-modal-backdrop" id="forgotBackdrop">
  <div class="jl-modal" style="position:relative;">
    <button class="jl-modal-close" type="button" aria-label="Close">×</button>
    <h3>Reset your password</h3>
    <p>Enter the email on your account — we'll send a secure reset link.</p>
    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label for="fEmail">Email</label>
        <input type="email" id="fEmail" placeholder="you@company.com" required />
        <div class="form-error"></div>
      </div>
      <button type="submit" class="btn btn-gold auth-submit">Send Reset Link</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
